spring.application.name=finpulse
spring.profiles.active=local

#  Server Configuration
server.port=8383
server.servlet.context-path=/api

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/finpulse_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Butwhy786}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP - Spring Boot default)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

#  JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

#  JWT Configuration
app.jwt.secret=${JWT_SECRET:myUltraSecretKeyThatIsAtLeast512BitsLongForHS512AlgorithmFinPulse2024!ExtraLong!}
app.jwt.access-token-expiration-ms=5184000
app.jwt.refresh-token-expiration-ms=604800000

# Cookie Configuration
app.cookie.domain=${COOKIE_DOMAIN:localhost}
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}
app.cookie.path=/

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/{registrationId}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

#  Frontend URL (for OAuth2 redirects)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Rate Limiting
app.rate-limit.auth.requests-per-minute=10
app.rate-limit.auth.block-duration-minutes=15

# Logging
logging.level.root=INFO
logging.level.com.finpulse=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

finpulse.encryption.key=ZbFLd9GVwhwSvNkh1pmEoSS+JsDGdE9AxgMKdfKxyU4=

spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.options.max-tokens=1024

assistant.mock.enabled=false

spring.security.filter.dispatcher-types=request,async